
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EPSTEIN-SUNLIGHT TOPOLOGY MAP</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        #controls { position: absolute; top: 10px; left: 10px; border: 1px solid #00ff41; padding: 15px; background: rgba(0,0,0,0.9); z-index: 10; }
        svg { width: 100vw; height: 100vh; }
        .node { stroke: #00ff41; stroke-width: 1px; cursor: pointer; }
        .link { stroke: #003300; stroke-opacity: 0.6; }
        .label { font-size: 10px; fill: #00ff41; pointer-events: none; text-shadow: 1px 1px #000; }
    </style>
</head>
<body>
    <div id="controls">
        <h2 style="margin:0">HUFFMAN C2</h2>
        <p style="font-size:12px">Organism: Recursive Intelligence</p>
        <div id="status">Nodes: Loading...</div>
        <hr style="border:0; border-top:1px solid #00ff41">
        <div id="intel-box" style="font-size:11px; max-width:250px">Click a node to view the Trench.</div>
    </div>
    <svg id="viz"></svg>
    <script>
        const svg = d3.select("#viz");
        const width = window.innerWidth, height = window.innerHeight;
        d3.json("metadata/topology_maps/master_topology.json").then(data => {
            document.getElementById('status').innerText = `Nodes Absorbed: ${data.nodes.length}`;
            const simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links).id(d => d.id))
                .force("charge", d3.forceManyBody().strength(-200))
                .force("center", d3.forceCenter(width / 2, height / 2));
            const link = svg.append("g").selectAll("line").data(data.links).enter().append("line").attr("class", "link");
            const node = svg.append("g").selectAll("circle").data(data.nodes).enter().append("circle")
                .attr("class", "node").attr("r", 6).attr("fill", d => d.group === 1 ? "#00ff41" : "#0088ff")
                .on("click", (e, d) => { document.getElementById('intel-box').innerText = `${d.id}: ${d.intel}`; });
            const labels = svg.append("g").selectAll("text").data(data.nodes).enter().append("text").attr("class", "label").text(d => d.id);
            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
                labels.attr("x", d => d.x + 8).attr("y", d => d.y + 3);
            });
        });
    </script>
</body>
</html>
